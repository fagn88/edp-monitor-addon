name: EDP Voucher Monitor
version: "1.2.4"
slug: edp_voucher_monitor
init: false
description: Monitoriza disponibilidade de vouchers EDP Packs e reclama automaticamente, notificando via ntfy
url: https://github.com/fagn88/edp-monitor-addon
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  6080/tcp: 6080
ports_description:
  6080/tcp: noVNC Web Interface (para login inicial)
options:
  ntfy_topic: "edp-voucher-fn2026"
  start_day: 1
  attempt_times:
    - "08:05"
    - "08:35"
    - "09:05"
  login_reminder_interval: 600
  targets:
    - name: "Pingo Doce"
      partner_id: 1197
schema:
  ntfy_topic: str
  start_day: int(1,28)
  attempt_times:
    - str
  login_reminder_interval: int(60,3600)
  targets:
    - name: str
      partner_id: int
